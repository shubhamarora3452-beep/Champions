<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Champions Program</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .hidden { display: none; }
        
        /* Styling for visual placeholders */
        .banner-placeholder {
            width: 150%;
            height: 500px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 120px;
            margin-bottom: 200px;
            background-image: url("https://github.com/shubhamarora3452-beep/Champions/blob/main/Mailer%20Champions%202024(1).png?raw=true"); /* Placeholder for your stock image */
            background-size: cover;
        }

        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,83,134,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        .points-badge { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner-placeholder">
        <h1 id="page-title">Student Champions Portal</h1>
    </div>

    <div id="login-section" class="card">
        <h2>Welcome, Student Champion</h2>
        <p>Enter your registered email to access your dashboard.</p>
        <input type="email" id="email-input" placeholder="email@university.edu">
        <button onclick="handleLogin()">Login</button>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="card">
            <h3>Active Design Challenges</h3>
            <div id="task-list">
                <p>Loading tasks...</p>
            </div>
        </div>

        <div class="card">
            <h3>Leaderboard</h3>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    </tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="background: #64748b;">Logout</button>
    </div>
</div>

<script>
    // Replace this URL with your Google Sheet CSV export link
    const SHEET_URL = "YOUR_GOOGLE_SHEET_CSV_EXPORT_LINK";

    async function fetchData() {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        return parseCSV(data);
    }

    function parseCSV(csvText) {
        const lines = csvText.split("\n");
        const headers = lines[0].split(",");
        return lines.slice(1).map(line => {
            const values = line.split(",");
            return headers.reduce((obj, header, i) => {
                obj[header.trim()] = values[i]?.trim();
                return obj;
            }, {});
        });
    }

    async function handleLogin() {
        const email = document.getElementById('email-input').value.toLowerCase();
        if(!email) return alert("Please enter an email");

        // Show dashboard
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        
        loadContent();
    }

    async function loadContent() {
        // In a real scenario, you'd fetch from your Sheet here
        // For now, these are placeholders for your logic
        const leaderboardBody = document.getElementById('leaderboard-body');
        const taskList = document.getElementById('task-list');

        // Example Task UI
        taskList.innerHTML = `
            <div style="border-left: 4px solid #2563eb; padding-left: 15px; margin-bottom: 15px;">
                <h4>UI/UX Challenge: Dark Mode Dashboard</h4>
                <p>Design a responsive dashboard. Reward: <span class="points-badge">500 pts</span></p>
                <a href="#">Submit Link</a>
            </div>
        `;

        // Example Leaderboard UI
        leaderboardBody.innerHTML = `
            <tr><td>1</td><td>Alex Rivera</td><td><span class="points-badge">1250</span></td></tr>
            <tr><td>2</td><td>Sam Smith</td><td><span class="points-badge">1100</span></td></tr>
        `;
    }
</script>

</body>

</html>

<body>

<div class="container">
    <div class="banner-placeholder">
        <h1 id="page-title">Student Champions Portal</h1>
    </div>

    <div id="login-section" class="card">
        <h2>Welcome, Student Champion</h2>
        <p>Enter your registered email to access your dashboard.</p>
        <input type="email" id="email-input" placeholder="email@university.edu">
        <button onclick="handleLogin()">Login</button>
    </div>

    <div id="dashboard-section" class="hidden">
        <div class="card">
            <h3>Active Design Challenges</h3>
            <div id="task-list">
                <p>Loading tasks...</p>
            </div>
        </div>

        <div class="card">
            <h3>Leaderboard</h3>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    </tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="background: #64748b;">Logout</button>
    </div>
</div>

<script>
    // Replace this URL with your Google Sheet CSV export link
    const SHEET_URL = "YOUR_GOOGLE_SHEET_CSV_EXPORT_LINK";

    async function fetchData() {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        return parseCSV(data);
    }

    function parseCSV(csvText) {
        const lines = csvText.split("\n");
        const headers = lines[0].split(",");
        return lines.slice(1).map(line => {
            const values = line.split(",");
            return headers.reduce((obj, header, i) => {
                obj[header.trim()] = values[i]?.trim();
                return obj;
            }, {});
        });
    }

    async function handleLogin() {
        const email = document.getElementById('email-input').value.toLowerCase();
        if(!email) return alert("Please enter an email");

        // Show dashboard
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        
        loadContent();
    }

    async function loadContent() {
        // In a real scenario, you'd fetch from your Sheet here
        // For now, these are placeholders for your logic
        const leaderboardBody = document.getElementById('leaderboard-body');
        const taskList = document.getElementById('task-list');

        // Example Task UI
        taskList.innerHTML = `
            <div style="border-left: 4px solid #2563eb; padding-left: 15px; margin-bottom: 15px;">
                <h4>UI/UX Challenge: Dark Mode Dashboard</h4>
                <p>Design a responsive dashboard. Reward: <span class="points-badge">500 pts</span></p>
                <a href="#">Submit Link</a>
            </div>
        `;

        // Example Leaderboard UI
        leaderboardBody.innerHTML = `
            <tr><td>1</td><td>Alex Rivera</td><td><span class="points-badge">1250</span></td></tr>
            <tr><td>2</td><td>Sam Smith</td><td><span class="points-badge">1100</span></td></tr>
        `;
    }
</script>

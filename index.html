<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Portal</title>
    <style>
        :root { --blue: #00467f; --gray: #f4f4f4; }
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #eee; }
        .hidden { display: none !important; }
        
        /* Box containers */
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .dashboard-container { background: white; width: 100%; min-height: 100vh; display: block; }
        
        /* Header */
        .header { background: var(--blue); color: white; padding: 20px; text-align: center; position: relative; }
        .logout-btn { position: absolute; top: 20px; right: 20px; background: none; color: white; border: 1px solid white; padding: 5px 10px; cursor: pointer; }
        
        /* Navigation */
        .tabs { display: flex; background: #ddd; }
        .tab { flex: 1; padding: 15px; border: none; cursor: pointer; font-weight: bold; }
        .tab.active { background: white; border-bottom: 3px solid var(--blue); }

        /* Tables */
        .content { padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f9f9f9; }

        input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: var(--blue); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2 style="color: var(--blue);">Champion Login</h2>
        <input type="email" id="email-field" placeholder="Enter email address">
        <button class="btn" onclick="login()">Access Portal</button>
    </div>

    <div id="dashboard-box" class="dashboard-container hidden">
        <div class="header">
            <button class="logout-btn" onclick="location.reload()">LOGOUT</button>
            <h1>CHAMPIONS 2026</h1>
            <p>Welcome, <span id="user-name">Champion</span></p>
        </div>
        
        <div class="tabs">
            <button id="t1" class="tab active" onclick="showTab('tasks')">TASKS</button>
            <button id="t2" class="tab" onclick="showTab('leaderboard')">LEADERBOARD</button>
        </div>

        <div class="content">
            <div id="v-tasks">
                <table>
                    <thead><tr><th>Task</th><th>Points</th><th>Status</th></tr></thead>
                    <tbody id="task-body"></tbody>
                </table>
            </div>
            <div id="v-lead" class="hidden">
                <table>
                    <thead><tr><th>Rank</th><th>Name</th><th>Total</th></tr></thead>
                    <tbody id="lead-body"></tbody>

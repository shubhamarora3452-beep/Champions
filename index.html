<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Dashboard</title>
    <style>
        :root { --blue: #00467f; --gray: #f2f2f2; }
        body { font-family: sans-serif; margin: 0; background: #fff; }
        .hidden { display: none !important; }
        .overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .card { width: 300px; padding: 30px; border: 1px solid #ddd; text-align: center; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--blue); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .banner { height: 100px; background: #0066b3; color: white; display: flex; align-items: center; justify-content: center; }
        table { width: 90%; margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f8f8; }
    </style>
</head>
<body>

<div id="login-overlay" class="overlay">
    <div class="card">
        <h2>Champion Login</h2>
        <input type="email" id="user-email" placeholder="Enter your email">
        <button onclick="startLogin()">Login</button>
    </div>
</div>

<div id="dashboard" class="hidden">
    <div class="banner"><h1>CHAMPIONS PORTAL</h1></div>
    <div style="padding: 20px; text-align: right;">Hello, <b id="user-name">User</b></div>
    <table>
        <thead>
            <tr><th>Task</th><th>Category</th><th>Points</th><th>Status</th></tr>
        </thead>
        <tbody id="task-table"></tbody>
    </table>
</div>

<script>
    // PASTE YOUR CSV LINK HERE
    const MY_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIJxgFFLAm8A-BVBtuuqAYTrmgAldjZT0wb3afoBpVOg95OV-Ug0xL2paE-koTnCcKduFaW2NfM0Hy/pub?output=csv";

    async function startLogin() {
        const inputEmail = document.getElementById('user-email').value.trim().toLowerCase();
        if(!inputEmail) return alert("Enter email");

        try {
            const res = await fetch(MY_SHEET_URL);
            const text = await res.text();
            
            // Convert CSV text to an Array
            const rows = text.split(/\r?\n/).map(row => row.split(','));

            // VALIDATION LOGIC:
            // It looks at Column B (index 1) of every row to see if it matches your input.
            const userRow = rows.find(r => r[1] && r[1].toLowerCase().trim() === inputEmail);

            if (userRow) {
                // Switch Screens
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('user-name').innerText = userRow[0]; // Get Name from Col A

                // Show tasks
                const tbody = document.getElementById('task-table');
                rows.slice(1).forEach(r => {
                    if(r[1] && r[1].toLowerCase().trim() === inputEmail) {
                        tbody.innerHTML += `<tr><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;
                    }
                });
            } else {
                alert("Email not found in our database!");
            }
        } catch (e) {
            alert("Error connecting to data.");
            console.error(e);
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Dashboard</title>
    <style>
        :root {
            --first-blue: #00467f;
            --bg-gray: #f2f2f2;
            --border-gray: #ccc;
        }
        body { font-family: Arial, sans-serif; background: white; margin: 0; padding: 0; }
        .top-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid #eee; }
        .logo-placeholder { font-weight: bold; color: var(--first-blue); border: 1px solid #ddd; padding: 5px 15px; }
        
        .banner {
            height: 120px;
            background: #0066b3; /* Solid blue until you add a stock image */
            display: flex; align-items: center; justify-content: center;
        }
        .banner h1 { color: white; letter-spacing: 2px; text-transform: uppercase; margin: 0; }

        .nav-tabs { display: flex; background: #e9ecef; border-bottom: 1px solid var(--border-gray); }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; font-weight: bold; border-right: 1px solid var(--border-gray); color: #333; }
        .tab.active { background: var(--first-blue); color: white; }

        .content-area { padding: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid var(--border-gray); }
        th { background: #f9f9f9; padding: 10px; text-align: left; border-bottom: 2px solid var(--border-gray); }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        /* Login UI */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; z-index: 1000; }
        .login-card { width: 320px; text-align: center; padding: 40px; border: 1px solid #eee; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input[type="email"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-blue { background: var(--first-blue); color: white; border: none; padding: 12px 24px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <div class="logo-placeholder">CHAMPIONS PROGRAM</div>
        <h2>Sign In</h2>
        <p style="font-size: 13px; color: #666;">Enter your email to view your tasks</p>
        <input type="email" id="user-email-input" placeholder="yourname@email.com">
        <button class="btn-blue" onclick="handleLogin()">ACCESS DASHBOARD</button>
    </div>
</div>

<div id="main-dashboard" class="hidden">
    <header class="top-header">
        <div class="logo-placeholder">FIRST CHAMPIONS</div>
        <div style="font-size: 14px;">Hello, <span id="display-name" style="font-weight: bold;">Champion</span></div>
    </header>

    <div class="banner">
        <h1>DASHBOARD</h1>
    </div>

    <nav class="nav-tabs">
        <div class="tab active">MY TASKS</div>
        <div class="tab">LEADERBOARD</div>
    </nav>

    <div class="content-area">
        <table>
            <thead>
                <tr>
                    <th>Task Name</th>
                    <th>Category</th>
                    <th>Points</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="task-list-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // DEFINE ONCE
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIJxgFFLAm8A-BVBtuuqAYTrmgAldjZT0wb3afoBpVOg95OV-Ug0xL2paE-koTnCcKduFaW2NfM0Hy/pub?output=csv";

    async function handleLogin() {
        const email = document.getElementById('user-email-input').value.trim().toLowerCase();
        
        if (!email) {
            alert("Please enter an email");
            return;
        }

        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            // Split by lines and commas
            const rows = text.split(/\r?\n/).map(row => row.split(','));
            
            // Search Column B (index 1) for the email
            const user = rows.find(r => r[1] && r[1].replace(/"/g, '').trim().toLowerCase() === email);

            if (user) {
                // Success
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                document.getElementById('display-name').innerText = user[0].replace(/"/g, '');
                
                loadTasks(rows, email);
            } else {
                alert("Email not found. Please check your spelling.");
            }
        } catch (err) {
            alert("Error: Could not connect to data.");
            console.error(err);
        }
    }

    function loadTasks(data, email) {
        const tbody = document.getElementById('task-list-body');
        tbody.innerHTML = "";
        
        data.forEach((row, index) => {
            if (index === 0) return; // skip header
            if (row[1] && row[1].replace(/"/g, '').trim().toLowerCase() === email) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${row[2] || 'Task'}</b></td>
                    <td>${row[3] || 'General'}</td>
                    <td>${row[4] || '0'}</td>
                    <td style="color: green;">${row[5] || 'Active'}</td>
                `;
                tbody.appendChild(tr);
            }
        });
    }
</script>
</body>
</html>
